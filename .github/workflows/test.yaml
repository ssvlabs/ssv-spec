name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "*" ]

jobs:

  test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Generate spec tests
        uses: ./.github/actions/generate-spec-tests

      - name: Test
        run: make test
