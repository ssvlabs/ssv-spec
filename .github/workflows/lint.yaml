name: Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "*" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version: 1.22.x

      - name: Get Dependencies
        run: go get -v -t -d ./...

      - name: Prepare
        run: make lint-prepare

      - name: Lint
        run: make lint
